name: "Platform Golden Path - Governance CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./day01/cloudnative-commerce-infra/infrastructure

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          cli_config_credentials_token: ${{ secrets.TFC_API_TOKEN }}

      - name: Install Conftest
        run: |
          curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.deb -o conftest.deb
          sudo apt install ./conftest.deb -y
          rm conftest.deb

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Convert Terraform Plan to JSON
        run: terraform show -json tfplan > plan.json

      - name: Run OPA Policy Check
        run: |
          conftest test \
            --policy ../../../day03/policy \
            plan.json

      - name: Final Success Message
        run: |
          echo "Golden Path governance validation completed successfully."
